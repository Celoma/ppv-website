services:

  # -------------------------
  # DATABASE
  # -------------------------
  db:
    image: postgres:16-alpine
    container_name: ppv_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------
  # BACKEND API
  # -------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ppv_backend
    restart: unless-stopped
    command: node src/index.js
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_password
      DB_NAME: tasks_db
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  # -------------------------
  # FRONTEND
  # -------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ppv_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/page2.html:/usr/share/nginx/html/page2.html:ro
      - ./ppv.png:/usr/share/nginx/html/ppv.png:ro
    depends_on:
      - backend
      - ollama

  # -------------------------
  # OLLAMA LLM
  # -------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ppv_ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: ["serve"]

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ppv_ollama_pull
    depends_on:
      - ollama
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      sleep 10 &&
      ollama pull mistral
    volumes:
      - ollama_data:/root/.ollama

  # -------------------------
  # MONITORING - PROMETHEUS
  # -------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ppv_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - cadvisor
      - node-exporter
      - postgres-exporter
      - backend

  # -------------------------
  # GRAFANA
  # -------------------------
  grafana:
    image: grafana/grafana:11.1.0
    container_name: ppv_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_COOKIE_SAMESITE=none
      - GF_SECURITY_COOKIE_SECURE=false   
      - GF_DASHBOARDS_VERSIONS_TO_KEEP=20
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=5s
      - GF_FEATURE_TOGGLES_DISABLE=tracesExplore,metricsExplore,logsExplore
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki

  # -------------------------
  # LOKI (LOGS)
  # -------------------------
  loki:
    image: grafana/loki:3.1.1
    container_name: ppv_loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.1.1
    container_name: ppv_promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    depends_on:
      - loki

  # -------------------------
  # DOCKER METRICS
  # -------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: ppv_cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  node-exporter:
    image: prom/node-exporter:latest
    container_name: ppv_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"

  # -------------------------
  # POSTGRES EXPORTER
  # -------------------------
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ppv_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://tasks_user:tasks_password@db:5432/tasks_db?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

# -------------------------
# VOLUMES
# -------------------------
volumes:
  postgres_data:
  ollama_data:
  backend_node_modules:
  loki_data:
  promtail_positions:
  grafana_data:
  prometheus_data:
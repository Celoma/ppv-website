services:
  db:
    image: postgres:16-alpine
    container_name: ppv_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasks_db
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ppv_backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_password
      DB_NAME: tasks_db
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    container_name: ppv_ollama
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: ["serve"]

  ollama-pull:
    image: ollama/ollama:latest
    container_name: ppv_ollama_pull
    depends_on:
      - ollama
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama_data:/root/.ollama
    command:
      - pull
      - llama3.2:1b

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ppv_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
      - ollama

volumes:
  postgres_data:
  ollama_data:

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # -------------------------
  # Prometheus lui-même
  # -------------------------
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # -------------------------
  # Machine / CPU / RAM
  # (INDISPENSABLE pour ton dashboard CPU/RAM)
  # -------------------------
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # -------------------------
  # Conteneurs Docker (CPU/RAM par container)
  # -------------------------
  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  # -------------------------
  # PostgreSQL metrics
  # -------------------------
  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # -------------------------
  # Backend API metrics (/metrics Express)
  # -------------------------
  - job_name: backend
    metrics_path: /metrics
    scrape_interval: 5s   # plus fin pour perf API
    static_configs:
      - targets: ["backend:4000"]